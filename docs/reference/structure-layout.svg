  <text x="500" y="560" font-size="14" fill="#555" font-style="italic">door swing</text>

  <!-- ===================== ROOF/NOSE-WALL LABELS (resolved equal) ===================== -->
  <text x="205" y="192" font-size="22" fill="#1a1a1a">43"</text>
  <text x="392" y="192" font-size="22" fill="#1a1a1a">43"</text>

  <!-- 13" nose-tip flat width -->
  <line x1="302" y1="150" x2="343" y2="150" stroke="#222" stroke-width="1.2"
        marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <line x1="302" y1="175" x2="302" y2="150" stroke="#888" stroke-width="0.8"/>
  <line x1="343" y1="175" x2="343" y2="150" stroke="#888" stroke-width="0.8"/>
  <text x="350" y="146" font-size="18" fill="#1a1a1a">13"</text>

  <!-- ===================== 141" left straight-wall length ===================== -->
  <line x1="120" y1="222" x2="120" y2="660" stroke="#222" stroke-width="1.2"
