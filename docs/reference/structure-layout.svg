  <line x1="120" y1="222" x2="175" y2="222" stroke="#888" stroke-width="0.8"/>
  <line x1="120" y1="660" x2="175" y2="660" stroke="#888" stroke-width="0.8"/>
  <text x="78" y="448" font-size="22" fill="#1a1a1a">141"</text>

