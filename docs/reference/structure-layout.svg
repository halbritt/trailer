  <line x1="470" y1="355" x2="470" y2="454" stroke="#fbfbfb" stroke-width="5"/>
  <line x1="470" y1="355" x2="470" y2="454" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="2,3"/>
  <!-- leaf at ~30deg open + swing arc -->
  <line x1="470" y1="454" x2="519" y2="540" stroke="#555" stroke-width="1.6"/>
  <path d="M 470 553 A 99 99 0 0 0 556 504" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="2,3"/>
