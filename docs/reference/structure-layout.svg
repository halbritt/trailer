  <!-- ===================== INTERIOR FOOTPRINT (plan view, symmetric V-nose) =====================
       Rear wall (bottom) 81" · straight side walls 141" · V-nose 15" deep to a 13" flat tip ·
       nose walls resolved to 43" each (were ~42/43 eyeballed) · overall 156" rear->tip -->
  <polygon points="175,660 175,222 302,175 343,175 470,222 470,660"
           fill="#fbfbfb" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>

  <!-- centerline (long axis) -->
  <line x1="322" y1="175" x2="322" y2="660" stroke="#bbb" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ===================== DOOR + SWING (curbside / right wall) ===================== -->
